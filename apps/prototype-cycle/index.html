<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>atomik — prototype cycle de bout en bout (v0.3 / IR 0.1)</title>
<style>
  :root{
    --bg:#f6f4ef; --panel:#ffffff; --ink:#22252a; --muted:#6b7280;
    --line:#e3ded4; --accent:#4457c5; --warn:#b45309; --err:#b91c1c;
    --edge:#5b6470; --refute:#b91c1c; --hi:#d97706; --good:#15803d;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.45 -apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
       background:var(--bg);color:var(--ink)}
  header{display:flex;gap:12px;align-items:center;padding:10px 16px;
         background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:650}
  header .sub{color:var(--muted);font-size:12px}
  header select,header button{font:inherit;padding:5px 9px;border:1px solid var(--line);
         border-radius:8px;background:#fff;cursor:pointer}
  header button:hover{border-color:var(--accent)}
  main{display:flex;gap:0;height:calc(100vh - 55px)}
  #left{width:44%;min-width:380px;display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--panel)}
  .tabs{display:flex;gap:2px;padding:8px 10px 0}
  .tabs button{font:inherit;border:1px solid var(--line);border-bottom:none;background:#f1ede4;
               padding:6px 12px;border-radius:8px 8px 0 0;cursor:pointer;color:var(--muted)}
  .tabs button.active{background:#fff;color:var(--ink);font-weight:600}
  .tabs .spacer{flex:1}
  #diagcount{align-self:center;font-size:12px;padding:2px 8px;border-radius:10px}
  #diagcount.good{background:#dcfce7;color:var(--good)}
  #diagcount.meh{background:#fef3c7;color:var(--warn)}
  #diagcount.bad{background:#fee2e2;color:var(--err)}
  .pane{flex:1;overflow:auto;border-top:1px solid var(--line)}
  textarea#src{width:100%;height:100%;border:none;resize:none;outline:none;
    font:13px/1.5 ui-monospace,'SF Mono',Menlo,Consolas,monospace;padding:12px;background:#fffdf8;color:#1f2430}
  #irjson{margin:0;padding:12px;font:12px/1.45 ui-monospace,Menlo,Consolas,monospace;white-space:pre;color:#333}
  .diag{padding:7px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
  .diag.error{border-left:4px solid var(--err)}
  .diag.warning{border-left:4px solid var(--warn)}
  .diag.ok{border-left:4px solid var(--good);cursor:default;color:var(--good)}
  .diag:hover{background:#faf7f0}

  #right{flex:1;display:flex;flex-direction:column;overflow:auto}
  #claimbar{display:flex;gap:10px;align-items:center;padding:12px 16px;flex-wrap:wrap}
  #claimbar .claimtext{font-size:15px;font-weight:650}
  #claimbar .subject{color:var(--muted);font-size:12px}
  .chip{display:inline-flex;gap:6px;align-items:center;padding:3px 10px;border-radius:999px;
        font-size:12px;border:1.4px solid var(--line);background:#fff;white-space:nowrap}
  .chip.warn{border-color:#f2d9a4;background:#fef8e7;color:var(--warn)}
  .chip.proj select{font:inherit;border:none;background:transparent}
  .chip.proj.suggested{border-color:var(--accent);box-shadow:0 0 0 3px #4457c522}
  .chip.proj em{color:var(--accent);font-style:normal;font-size:11px}
  .status-established{border-style:solid;border-color:#9bb69e;background:#eef6ee}
  .status-supported{border-style:solid}
  .status-contested{border-style:dashed;border-color:#d9a441;background:#fdf6e8}
  .status-hypothesis{border-style:dashed}
  .status-speculative{border-style:dotted}
  .status-reported{border-style:solid;border-color:#a8b6d9;background:#eef1fb}
  .status-unspecified{color:var(--muted)}
  #notices{display:flex;gap:8px;padding:0 16px 8px;flex-wrap:wrap;align-items:center}
  #stage{padding:4px 16px}
  svg.scene{width:100%;max-height:62vh;background:#fffdf8;border:1px solid var(--line);border-radius:14px}
  #notes{padding:2px 16px;display:flex;flex-direction:column;gap:6px}
  .note{background:#f0f3ff;border:1px solid #d8def7;border-radius:10px;padding:7px 10px;font-size:13px}
  .note .origin{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-right:8px}
  #inputs{padding:8px 16px;display:flex;gap:16px;flex-wrap:wrap}
  .input{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:220px}
  .input.locked{border-color:var(--hi);box-shadow:0 0 0 3px #d9770622}
  .input>label{display:block;font-weight:600;margin-bottom:6px}
  .input .opt{display:block;margin:3px 0;cursor:pointer}
  .input .val{font-variant-numeric:tabular-nums;color:var(--muted)}
  #meters{padding:0 16px 8px;display:flex;gap:16px;flex-wrap:wrap}
  .meter{min-width:240px}
  .meter .bar{height:10px;background:#eee7d8;border-radius:6px;overflow:hidden;margin-top:4px}
  .meter .fill{height:100%;background:var(--accent)}
  #stepnav{display:flex;gap:12px;align-items:center;padding:10px 16px 18px}
  #stepnav.empty{display:none}
  #stepnav button{font:inherit;padding:7px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}
  #stepnav button:disabled{opacity:.4;cursor:default}
  #stepnav .steplabel{font-weight:650}
  #stepnav .lock{color:var(--hi);font-size:13px}
</style>
<style id="scene-css">
  .box{fill:#ffffff;stroke:#5b6470;stroke-width:1.6}
  .node.role-evidence .box{fill:#f4f7ff}
  .node .fold{fill:#dbe3f5;stroke:#5b6470;stroke-width:1.2}
  .node.role-assumption .box{stroke-dasharray:5 4}
  .node.role-start .box,.node.role-terminal .box{fill:#f2efe7}
  .node .inner{fill:none}
  .label{font:13px -apple-system,'Segoe UI',sans-serif;fill:#22252a;text-anchor:middle;dominant-baseline:middle}
  .edge path{stroke:#5b6470;stroke-width:1.8}
  .edge.cls-refutation path{stroke:#b91c1c;stroke-dasharray:7 4}
  .edge.cls-analogy path{stroke-dasharray:2 4}
  .edge.cls-boundary path{stroke-dasharray:2 3}
  .edge.cls-hypothesis path{stroke-dasharray:8 3;opacity:.85}
  .edgelabel{font:10.5px -apple-system,sans-serif;fill:#6b7280;text-anchor:middle}
  .breakglyph{font-size:13px;text-anchor:middle;fill:#b45309}
  .strike{stroke:#b91c1c;stroke-width:2.4;stroke-linecap:round}
  .falsebadge{fill:#b91c1c}
  .falsebadgetext{font:600 10px -apple-system,sans-serif;fill:#fff;text-anchor:middle}
  .glow{fill:none;stroke:#d97706;stroke-width:3;opacity:.55}
  .node.hi .box{stroke:#d97706;stroke-width:2.4}
  .edge.hi path{stroke-width:3}
  .node.criterial .box{stroke-width:2.6}
  .node.incidental{opacity:.62}
  .stepbadge{fill:#4457c5}
  .stepbadgetext{font:700 10px -apple-system,sans-serif;fill:#fff;text-anchor:middle}
</style>
</head>
<body>
<header>
  <h1>atomik — prototype « cycle » de bout en bout</h1>
  <span class="sub">texte → IR 0.1 → layout → runtime pur · C1–C4 appliqués</span>
  <span style="flex:1"></span>
  <select id="preset" title="Préréglages"></select>
  <button id="export" title="Export SVG : tout révélé + badges d'étape (render-core §5)">SVG ⭳</button>
</header>
<main>
  <section id="left">
    <div class="tabs">
      <button id="tab-source" class="active">Source</button>
      <button id="tab-ir">IR</button>
      <button id="tab-diag">Diagnostics</button>
      <span class="spacer"></span>
      <span id="diagcount" class="good">✓</span>
    </div>
    <div id="pane-source" class="pane"><textarea id="src" spellcheck="false"></textarea></div>
    <div id="pane-ir" class="pane" style="display:none"><pre id="irjson"></pre></div>
    <div id="pane-diag" class="pane" style="display:none"><div id="diags"></div></div>
  </section>
  <section id="right">
    <div id="claimbar"></div>
    <div id="notices"></div>
    <div id="stage"></div>
    <div id="notes"></div>
    <div id="inputs"></div>
    <div id="meters"></div>
    <div id="stepnav"></div>
  </section>
</main>
<script>
/* atomik lang kernel — text → Scene IR (irVersion 0.1).
 * Tokenize, parse, ground (stub), validate (both profiles), fill defaults,
 * compute initial visibility (D4/C1), reject set/require in rules (C2).
 * Conforms to atomik_dsl_spec_v0_3.md (v0.3.1) and render-core spec §2.
 * DOM-free, dependency-free. UMD-ish: Node (require) or browser (AtomikLang).
 */
(function (root, factory) {
  if (typeof module !== 'undefined' && module.exports) module.exports = factory();
  else root.AtomikLang = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  var STATUSES = ['established', 'supported', 'contested', 'hypothesis',
    'speculative', 'reported', 'misconception', 'unspecified'];
  var CLASSES = ['fact', 'inference', 'hypothesis', 'analogy',
    'interpretation', 'refutation', 'boundary', 'unspecified'];
  var ROLES = ['process', 'decision', 'start', 'terminal',
    'question', 'evidence', 'assumption', 'contradiction'];
  var ARCHETYPES = ['graph', 'flow', 'cycle', 'tree', 'nested', 'concentric',
    'timeline', 'axis', 'matrix', 'bar', 'map'];
  var RELPOS = ['above', 'below', 'left-of', 'right-of', 'inside', 'adjacent'];
  var EFFECTS = ['note', 'reveal', 'hide', 'highlight', 'set', 'require'];

  /* ---------------- small utils ---------------- */

  function isIdent(s) { return /^[A-Za-z_][A-Za-z0-9_-]*$/.test(s); }

  function unquote(s) {
    // s includes the surrounding double quotes
    var out = '', i;
    for (i = 1; i < s.length - 1; i++) {
      var c = s[i];
      if (c === '\\' && i + 1 < s.length - 1) { out += s[i + 1]; i++; }
      else out += c;
    }
    return out;
  }

  /* strip a `#` comment, respecting "…" strings and [[…]] links */
  function stripComment(line) {
    var inStr = false, i;
    for (i = 0; i < line.length; i++) {
      var c = line[i];
      if (inStr) {
        if (c === '\\') i++;
        else if (c === '"') inStr = false;
      } else if (c === '"') inStr = true;
      else if (c === '#') return line.slice(0, i);
    }
    return line;
  }

  /* pull trailing [key], [key value], [key "value"], [key [[Wiki]]] attrs */
  var ATTR_RE = /\s*\[([A-Za-z_][A-Za-z0-9_-]*)(?:\s+("(?:[^"\\]|\\.)*"|\[\[[^\]]+\]\]|[^\]"]+?))?\s*\]\s*$/;
  function extractAttrs(rest) {
    var attrs = {}, order = [];
    for (;;) {
      var m = ATTR_RE.exec(rest);
      if (!m) break;
      var key = m[1];
      var val = true;
      if (m[2] !== undefined) {
        var raw = m[2].trim();
        if (raw[0] === '"') val = unquote(raw);
        else val = raw;
      }
      attrs[key] = val; order.unshift(key);
      rest = rest.slice(0, m.index);
    }
    return { head: rest.trim(), attrs: attrs, order: order };
  }

  /* tokenizer for statement heads (after keyword, before attrs) */
  function Scanner(s) { this.s = s; this.i = 0; }
  Scanner.prototype.ws = function () { while (this.i < this.s.length && /\s/.test(this.s[this.i])) this.i++; };
  Scanner.prototype.eof = function () { this.ws(); return this.i >= this.s.length; };
  Scanner.prototype.peek = function () { this.ws(); return this.s[this.i]; };
  Scanner.prototype.rest = function () { this.ws(); return this.s.slice(this.i); };
  Scanner.prototype.tryLit = function (lit) {
    this.ws();
    if (this.s.startsWith(lit, this.i)) { this.i += lit.length; return true; }
    return false;
  };
  Scanner.prototype.word = function () {
    this.ws();
    var m = /^[^\s"]+/.exec(this.s.slice(this.i));
    if (!m) return null;
    this.i += m[0].length; return m[0];
  };
  Scanner.prototype.string = function () {
    this.ws();
    if (this.s[this.i] !== '"') return null;
    var j = this.i + 1;
    while (j < this.s.length) {
      if (this.s[j] === '\\') j += 2;
      else if (this.s[j] === '"') { var raw = this.s.slice(this.i, j + 1); this.i = j + 1; return unquote(raw); }
      else j++;
    }
    return null; // unterminated
  };
  Scanner.prototype.wikilink = function () {
    this.ws();
    if (!this.s.startsWith('[[', this.i)) return null;
    var end = this.s.indexOf(']]', this.i + 2);
    if (end < 0) return null;
    var inner = this.s.slice(this.i + 2, end); this.i = end + 2;
    return inner.trim();
  };

  /* ---------------- expression parser ---------------- */
  function tokenizeExpr(s, err) {
    var toks = [], i = 0;
    var re2 = ['==', '!=', '<=', '>='];
    while (i < s.length) {
      var c = s[i];
      if (/\s/.test(c)) { i++; continue; }
      if (c === '"') {
        var j = i + 1;
        while (j < s.length && !(s[j] === '"' && s[j - 1] !== '\\')) j++;
        if (j >= s.length) { err('unterminated-string'); return toks; }
        toks.push({ t: 'str', v: unquote(s.slice(i, j + 1)) }); i = j + 1; continue;
      }
      var two = s.slice(i, i + 2);
      if (re2.indexOf(two) >= 0) { toks.push({ t: 'op', v: two }); i += 2; continue; }
      if ('<>+-*/()'.indexOf(c) >= 0) { toks.push({ t: 'op', v: c }); i++; continue; }
      var m = /^[A-Za-z_][A-Za-z0-9_-]*/.exec(s.slice(i));
      if (m) {
        var w = m[0];
        if (w === 'and' || w === 'or' || w === 'not') toks.push({ t: 'op', v: w });
        else toks.push({ t: 'id', v: w });
        i += w.length; continue;
      }
      var n = /^-?\d+(\.\d+)?/.exec(s.slice(i));
      if (n) { toks.push({ t: 'num', v: parseFloat(n[0]) }); i += n[0].length; continue; }
      err('bad-char', c); i++;
    }
    return toks;
  }

  function parseExpr(src, onErr) {
    var bad = false;
    var toks = tokenizeExpr(src, function () { bad = true; });
    var p = 0;
    function peek() { return toks[p]; }
    function eat(v) { if (toks[p] && toks[p].t === 'op' && toks[p].v === v) { p++; return true; } return false; }
    function fact() {
      var t = peek();
      if (!t) { bad = true; return { op: 'lit', value: 0 }; }
      if (eat('not')) return { op: 'not', a: fact() };
      if (eat('(')) { var e = or(); if (!eat(')')) bad = true; return e; }
      if (t.t === 'num') { p++; return { op: 'lit', value: t.v }; }
      if (t.t === 'str') { p++; return { op: 'lit', value: t.v }; }
      if (t.t === 'id') { p++; return { op: 'ref', id: t.v }; }
      bad = true; p++; return { op: 'lit', value: 0 };
    }
    function term() { var a = fact(); for (;;) { if (eat('*')) a = { op: '*', a: a, b: fact() }; else if (eat('/')) a = { op: '/', a: a, b: fact() }; else return a; } }
    function sum() { var a = term(); for (;;) { if (eat('+')) a = { op: '+', a: a, b: term() }; else if (eat('-')) a = { op: '-', a: a, b: term() }; else return a; } }
    function cmp() {
      var a = sum(); var t = peek();
      if (t && t.t === 'op' && ['==', '!=', '<', '<=', '>', '>='].indexOf(t.v) >= 0) { p++; return { op: t.v, a: a, b: sum() }; }
      return a;
    }
    function and() { var a = cmp(); while (eat('and')) a = { op: 'and', a: a, b: cmp() }; return a; }
    function or() { var a = and(); while (eat('or')) a = { op: 'or', a: a, b: and() }; return a; }
    var e = or();
    if (p < toks.length) bad = true;
    if (bad && onErr) onErr();
    return e;
  }

  function exprRefs(e, out) {
    out = out || [];
    if (!e) return out;
    if (e.op === 'ref') out.push(e.id);
    if (e.a) exprRefs(e.a, out);
    if (e.b) exprRefs(e.b, out);
    return out;
  }

  /* ---------------- effect parser ---------------- */
  function parseEffect(sc, diag, line) {
    var w = sc.word();
    if (!w || EFFECTS.indexOf(w) < 0) { diag(line, 'bad-effect', 'error', 'expected an effect: ' + EFFECTS.join(' | ')); return null; }
    if (w === 'note') {
      var s = sc.string();
      if (s === null) { diag(line, 'note-string', 'error', 'note expects a quoted string'); return null; }
      return { type: 'note', text: s };
    }
    if (w === 'set') {
      var id = sc.word(); var v = sc.string();
      if (v === null) { var wv = sc.word(); v = wv !== null && /^-?\d+(\.\d+)?$/.test(wv) ? parseFloat(wv) : wv; }
      if (!id || v === null || v === undefined) { diag(line, 'set-args', 'error', 'set expects: set <input> <value>'); return null; }
      return { type: 'set', input: id, value: v };
    }
    if (w === 'require') {
      var rid = sc.word();
      if (!rid) { diag(line, 'require-args', 'error', 'require expects an input id'); return null; }
      return { type: 'require', input: rid };
    }
    var targets = [];
    for (;;) { var t = sc.word(); if (!t) break; targets.push(t); }
    if (!targets.length) { diag(line, 'targets', 'error', w + ' expects at least one id'); return null; }
    return { type: w, targets: targets };
  }

  /* ---------------- ground (stub) ---------------- */
  /* Prototype grounding: every wikilink resolves to a note named by its text.
   * A real lang-core resolves against the vault index; authored links to
   * missing notes become { kind:"unresolved" } (render-core spec D3). */
  function groundLink(inner, resolver) {
    if (resolver) return resolver(inner);
    return { kind: 'note', target: inner };
  }

  /* ---------------- parse → IR ---------------- */
  function parse(text, opts) {
    opts = opts || {};
    var diagnostics = [];
    function diag(line, code, severity, message, hint) {
      var d = { line: line, code: code, severity: severity, message: message };
      if (hint) d.hint = hint;
      diagnostics.push(d);
    }

    var ir = {
      irVersion: '0.1',
      surface: { language: 'atomik', version: '0.0' },
      origin: 'authored',
      diagnostics: diagnostics,
      scene: null, claim: null,
      groups: [], nodes: [], relations: [], places: [], data: [],
      inputs: [], deriveds: [], rules: [], steps: [], marks: []
    };
    var stepsRaw = {}; // sourceStep -> {effects, requires, lines}
    var dataById = {};
    var synth = 0;

    var lines = text.split(/\r?\n/);
    for (var ln = 1; ln <= lines.length; ln++) {
      var raw = stripComment(lines[ln - 1]);
      if (!raw.trim()) continue;
      var ex = extractAttrs(raw);
      var head = ex.head, attrs = ex.attrs;
      var sc = new Scanner(head);
      var kw = sc.word();
      if (!kw) continue;

      switch (kw) {
        case 'atomik': {
          var v = sc.word();
          ir.surface.version = v || '0.0';
          break;
        }
        case 'scene': {
          var sid = sc.word();
          if (!sid || !isIdent(sid)) { diag(ln, 'scene-id', 'error', 'scene expects an identifier'); break; }
          ir.scene = { id: sid, line: ln };
          if (attrs.origin === 'generated' || attrs.origin === 'authored') ir.origin = attrs.origin;
          break;
        }
        case 'claim': {
          var ct = sc.string();
          if (ct === null) { diag(ln, 'claim-string', 'error', 'claim expects a quoted string'); break; }
          var cst = attrs.status;
          if (cst && STATUSES.indexOf(cst) < 0) { diag(ln, 'bad-status', 'warning', 'unknown status "' + cst + '"', 'one of: ' + STATUSES.join(' ')); cst = 'unspecified'; }
          ir.claim = { text: ct, status: cst || 'unspecified', line: ln };
          break;
        }
        case 'subject': {
          var wl = sc.wikilink();
          var lbl;
          if (wl !== null) lbl = { text: wl, ref: groundLink(wl, opts.resolver) };
          else { var ss = sc.string(); if (ss === null) { diag(ln, 'subject-arg', 'error', 'subject expects [[Note]] or "text"'); break; } lbl = { text: ss, ref: { kind: 'literal' } }; }
          ir.subject = { label: lbl, line: ln };
          break;
        }
        case 'node': case 'evidence': {
          var nid = sc.word();
          if (!nid || !isIdent(nid)) { diag(ln, kw + '-id', 'error', kw + ' expects an identifier'); break; }
          var nwl = sc.wikilink(); var nlbl;
          if (nwl !== null) nlbl = { text: nwl, ref: groundLink(nwl, opts.resolver) };
          else { var ns = sc.string(); if (ns === null) { diag(ln, kw + '-label', 'error', kw + ' expects a "label" or [[Note]]'); break; } nlbl = { text: ns, ref: { kind: 'literal' } }; }
          var role = kw === 'evidence' ? 'evidence' : (attrs.role || 'process');
          if (ROLES.indexOf(role) < 0) { diag(ln, 'bad-role', 'warning', 'unknown role "' + role + '"'); role = 'process'; }
          var nst = attrs.status || 'unspecified';
          if (STATUSES.indexOf(nst) < 0) { diag(ln, 'bad-status', 'warning', 'unknown status "' + nst + '"'); nst = 'unspecified'; }
          var node = { id: nid, label: nlbl, role: role, status: nst };
          if (attrs['in']) node.group = String(attrs['in']);
          if (attrs.salience === 'criterial' || attrs.salience === 'incidental') node.salience = attrs.salience;
          if (typeof attrs.tone === 'string') node.tone = attrs.tone;
          if (attrs.source !== undefined) {
            var sv = String(attrs.source);
            var mlink = /^\[\[([^\]]+)\]\]$/.exec(sv);
            node.source = mlink ? { text: mlink[1].trim(), ref: groundLink(mlink[1].trim(), opts.resolver) }
                                : { text: sv, ref: { kind: 'literal' } };
          }
          if (attrs.date !== undefined) node.date = String(attrs.date);
          node.initiallyHidden = false; // computed after full pass (D4)
          node.line = ln;
          node.extras = {};
          var known = ['role', 'status', 'in', 'salience', 'tone', 'source', 'date'];
          for (var k in attrs) if (known.indexOf(k) < 0) node.extras[k] = attrs[k];
          ir.nodes.push(node);
          break;
        }

  var SVGNS = 'http://www.w3.org/2000/svg';

  var PRESETS = {
    demo: { label: '1 · Démo complète (cycle + méprise + porte)', src: "atomik 0.3\nscene cycle_eau_demo [origin authored]\nclaim \"L'eau ne disparaît jamais : elle circule en boucle en changeant d'état.\" [status established]\nsubject [[Cycle de l'eau]]\n\nnode gone \"L'eau d'une flaque séchée a disparu pour toujours\" [status misconception]\nnode evap \"Évaporation\"\nnode cond \"Condensation\"\nnode pluie \"Précipitations\"\nnode coll \"Ruissellement\"\n\nrelation evap -> cond puis [as fact]\nrelation cond -> pluie puis [as fact]\nrelation pluie -> coll puis [as fact]\nrelation coll -> evap puis [as fact]\nrelation evap -> gone réfute [as refutation]\n\nproject as cycle\n\ninput devine = choice \"elle a disparu\" | \"elle est passée dans l'air\" [label \"Une flaque sèche au soleil. Où est passée l'eau ?\"]\n\nrule devine == \"elle est passée dans l'air\" => note \"Exactement — suivons-la.\"\nrule devine != \"elle est passée dans l'air\" => note \"Intuition très répandue. Suivons l'eau pour voir.\"\n\nstep 1 reveal gone\nstep 1 note \"Beaucoup pensent que l'eau séchée est perdue.\"\nstep 2 require devine\nstep 2 reveal evap\nstep 3 reveal cond pluie\nstep 4 reveal coll\nstep 4 highlight evap\n" },
    simple: { label: '2 · Cycle simple + curseur (projection suggérée)', src: "atomik 0.3\nscene cycle_simple\nclaim \"Le cycle de l'eau est entretenu par l'énergie solaire.\" [status established]\nsubject [[Cycle de l'eau]]\n\nnode evap \"Évaporation\"\nnode cond \"Condensation\"\nnode pluie \"Précipitations\"\nnode coll \"Ruissellement\"\n\nrelation evap -> cond puis [as fact]\nrelation cond -> pluie puis [as fact]\nrelation pluie -> coll puis [as fact]\nrelation coll -> evap puis [as fact]\n\nproject as cycle [suggested]\n\ninput soleil = slider 0..100 [default 60] [label \"Énergie solaire %\"]\nderive evaporation = soleil * 0.9\nmark meter \"Taux d'évaporation\" value evaporation [max 100]\nrule soleil < 15 => note \"Presque plus d'évaporation : le cycle ralentit fortement.\"\nrule soleil > 85 => highlight evap\n" },
    northstar: { label: '3 · Étoile polaire (fixture, rendu de secours)', src: "atomik 0.3\nscene falling_objects [origin authored]\nclaim \"In the absence of air, all objects fall at the same rate.\" [status established]\nsubject [[Free fall]]\n\nnode belief \"Heavy objects fall faster\" [status misconception]\nnode vacuum \"Hammer and feather dropped in a vacuum\" [role evidence]\nnode truth \"Both land together\" [role terminal]\nnode reason \"Air resistance, not mass, caused the difference\"\nrelation vacuum -> belief refutes [as refutation]\nrelation vacuum -> truth shows [as fact]\nrelation reason -> truth explains [as inference]\n\ninput guess = choice \"hammer first\" | \"together\" | \"feather first\" [label \"Predict:\"]\nrule guess == \"together\" => note \"You predicted it — now here's why.\"\nrule guess != \"together\" => note \"A very common intuition. Watch what actually happens.\"\nstep 1 reveal belief\nstep 1 note \"Most people expect the heavy object to win.\"\nstep 2 require guess\nstep 2 reveal vacuum\nstep 3 reveal truth\nstep 3 highlight truth\nstep 4 reveal reason\n" },
    broken: { label: '4 · Diagnostics (scène volontairement cassée)', src: "atomik 0.3\nscene demo_erreurs\nclaim \"Scène volontairement cassée pour montrer les diagnostics ligne à ligne.\"\nnode alpha \"Alpha\"\nnode beta \"Bêta\"\nrelation alpha -> alfa cause\ninput x = slider 0..10 [default 3]\nrule x > 5 => set x 0\nfoobar hello world\nstep 1 reveal alpha\n" }
  };

  var STATUS_GLYPH = {
    established: '●', supported: '◉', contested: '◐', hypothesis: '?',
    speculative: '≈', reported: 'ℹ', misconception: '✕', unspecified: '·'
  };
  var STATUS_FR = {
    established: 'établi', supported: 'étayé', contested: 'contesté', hypothesis: 'hypothèse',
    speculative: 'spéculatif', reported: 'rapporté', misconception: 'croyance fausse', unspecified: 'non précisé'
  };

  var state = { currentStep: 1, inputs: {}, committed: [] };
  var ir = null, geo = null, notices = [], compiled = false;

  /* ---------- compile ---------- */
  var debounceTimer = null;
  function onEdit() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(compile, 220);
  }

  function compile() {
    var src = $('src').value;
    ir = Atomik.parse(src);
    var L = Atomik.layout(ir);
    geo = L.layout; notices = L.notices.slice();
    var skipped = geo.edges.filter(function (e) { return e.skip; }).length;
    if (skipped) notices.push(skipped + ' arête(s) vers claim/relation non tracée(s) (prototype)');
    state = { currentStep: 1, inputs: {}, committed: [] };
    compiled = true;
    renderAll();
  }

  /* ---------- render ---------- */
  function renderAll() {
    if (!compiled) return;
    renderDiagnostics();
    renderIRTab();
    renderClaimBar();
    renderNotices();
    var pres = Atomik.present(ir, state);
    renderStage(pres, { badges: false });
    renderNotes(pres);
    renderInputs(pres);
    renderMeters(pres);
    renderStepNav(pres);
  }

  function renderClaimBar() {
    var bar = $('claimbar');
    bar.innerHTML = '';
    if (!ir.claim) { bar.textContent = '— pas de claim —'; return; }
    var chip = document.createElement('span');
    chip.className = 'chip status-' + ir.claim.status;
    chip.textContent = STATUS_GLYPH[ir.claim.status] + ' ' + STATUS_FR[ir.claim.status];
    var txt = document.createElement('span');
    txt.className = 'claimtext';
    txt.textContent = ir.claim.text;
    bar.appendChild(chip); bar.appendChild(txt);
    if (ir.subject) {
      var sub = document.createElement('span');
      sub.className = 'subject';
      sub.textContent = '⌘ ' + ir.subject.label.text;
      bar.appendChild(sub);
    }
  }

  function renderNotices() {
    var row = $('notices'); row.innerHTML = '';
    /* projection selector (I4): prominent when suggested */
    var projWrap = document.createElement('span');
    projWrap.className = 'chip proj' + (ir.projection && ir.projection.suggested ? ' suggested' : '');
    projWrap.appendChild(document.createTextNode('projection : '));
    var sel = document.createElement('select');
    Atomik.constants.ARCHETYPES.forEach(function (a) {
      var o = document.createElement('option');
      o.value = a; o.textContent = a;
      sel.appendChild(o);
    });
    sel.value = ir.projection ? ir.projection.archetype : 'graph';
    sel.onchange = function () { flipProjection(sel.value); };
    projWrap.appendChild(sel);
    if (ir.projection && ir.projection.suggested) {
      var st = document.createElement('em'); st.textContent = ' suggérée par l’IA — à toi de trancher';
      projWrap.appendChild(st);
    }
    row.appendChild(projWrap);
    notices.forEach(function (n) {
      var c = document.createElement('span');
      c.className = 'chip warn'; c.textContent = n;
      row.appendChild(c);
    });
  }

  /* I4: flipping rewrites exactly the project line in the source */
  function flipProjection(arch) {
    var ta = $('src');
    var lines = ta.value.split('\n');
    if (ir.projection && ir.projection.line) {
      var i = ir.projection.line - 1;
      lines[i] = lines[i].replace(/project\s+as\s+[A-Za-z-]+/, 'project as ' + arch);
    } else {
      lines.push('project as ' + arch);
    }
    ta.value = lines.join('\n');
    compile();
  }

  function renderStage(pres, opts) {
    var host = $('stage');
    host.innerHTML = '';
    host.appendChild(buildSVG(pres, opts));
  }

  function buildSVG(pres, opts) {
    opts = opts || {};
    var svg = document.createElementNS(SVGNS, 'svg');
    var vb = geo.viewBox;
    svg.setAttribute('viewBox', vb.join(' '));
    svg.setAttribute('class', 'scene');
    svg.setAttribute('role', 'img');
    if (ir.claim) svg.setAttribute('aria-label', ir.claim.text + ' (statut : ' + STATUS_FR[ir.claim.status] + ')');

    var defs = document.createElementNS(SVGNS, 'defs');
    defs.innerHTML =
      '<marker id="m-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">' +
      '<path d="M0,0 L10,5 L0,10 z" fill="var(--edge)"/></marker>' +
      '<marker id="m-tbar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">' +
      '<path d="M8,0 L8,10" stroke="var(--refute)" stroke-width="2.6"/></marker>';
    svg.appendChild(defs);

    var visN = {}, visR = {}, hi = {};
    pres.visibleNodes.forEach(function (id) { visN[id] = true; });
    pres.visibleRelations.forEach(function (id) { visR[id] = true; });
    pres.highlighted.forEach(function (id) { hi[id] = true; });

    var relById = {};
    ir.relations.forEach(function (r) { relById[r.id] = r; });

    /* edges under nodes */
    geo.edges.forEach(function (e) {
      if (e.skip) return;
      var r = relById[e.id];
      var g = document.createElementNS(SVGNS, 'g');
      g.setAttribute('class', 'edge cls-' + r['class'] + (hi[r.id] ? ' hi' : ''));
      if (!visR[r.id]) g.setAttribute('display', 'none');
      var p = document.createElementNS(SVGNS, 'path');
      p.setAttribute('d', e.ring ? e.path : ('M ' + e.x1 + ' ' + e.y1 + ' L ' + e.x2 + ' ' + e.y2));
      p.setAttribute('fill', 'none');
      if (r.directed) p.setAttribute('marker-end', r['class'] === 'refutation' ? 'url(#m-tbar)' : 'url(#m-arrow)');
      g.appendChild(p);
      if (r['class'] === 'boundary') {
        var bx = e.ring ? e.labelAt.x : (e.x1 + e.x2) / 2;
        var by = e.ring ? e.labelAt.y : (e.y1 + e.y2) / 2;
        var brk = document.createElementNS(SVGNS, 'text');
        brk.setAttribute('x', bx); brk.setAttribute('y', by);
        brk.setAttribute('class', 'breakglyph'); brk.textContent = '✂';
        g.appendChild(brk);
      }
      if (r.kind || r.sign || r.label) {
        var t = document.createElementNS(SVGNS, 'text');
        t.setAttribute('x', e.labelAt.x); t.setAttribute('y', e.labelAt.y);
        t.setAttribute('class', 'edgelabel');
        t.textContent = (r.kind || '') + (r.sign ? ' ' + r.sign : '') + (r.label ? ' — ' + r.label : '');
        g.appendChild(t);
      }
      svg.appendChild(g);
    });

    /* first-revealing step per id (for export badges) */
    var firstStep = {};
    ir.steps.forEach(function (s) {
      s.effects.forEach(function (e) {
        if (e.type === 'reveal') e.targets.forEach(function (t) {
          if (firstStep[t] === undefined) firstStep[t] = s.sourceStep;
        });
      });
    });

    ir.nodes.forEach(function (n) {
      var p = geo.pos[n.id], b = geo.boxes[n.id];
      if (!p) return;
      var g = document.createElementNS(SVGNS, 'g');
      g.setAttribute('class', 'node role-' + n.role + ' status-' + n.status +
        (hi[n.id] ? ' hi' : '') + (n.salience === 'criterial' ? ' criterial' : '') +
        (n.salience === 'incidental' ? ' incidental' : ''));
      if (!visN[n.id]) g.setAttribute('display', 'none');
      g.setAttribute('aria-label', n.label.text);
      var x = p.x - b.w / 2, y = p.y - b.h / 2;

      if (hi[n.id]) {
        var glow = document.createElementNS(SVGNS, 'rect');
        glow.setAttribute('x', x - 5); glow.setAttribute('y', y - 5);
        glow.setAttribute('width', b.w + 10); glow.setAttribute('height', b.h + 10);
        glow.setAttribute('rx', 14); glow.setAttribute('class', 'glow');
        g.appendChild(glow);
      }

      var shape;
      if (n.role === 'decision') {
        shape = document.createElementNS(SVGNS, 'polygon');
        shape.setAttribute('points',
          p.x + ',' + y + ' ' + (x + b.w) + ',' + p.y + ' ' + p.x + ',' + (y + b.h) + ' ' + x + ',' + p.y);
      } else {
        shape = document.createElementNS(SVGNS, 'rect');
        shape.setAttribute('x', x); shape.setAttribute('y', y);
        shape.setAttribute('width', b.w); shape.setAttribute('height', b.h);
        shape.setAttribute('rx', (n.role === 'start' || n.role === 'terminal') ? b.h / 2 : 10);
      }
      shape.setAttribute('class', 'box');
      g.appendChild(shape);

      if (n.role === 'contradiction') {
        var inner = document.createElementNS(SVGNS, 'rect');
        inner.setAttribute('x', x + 4); inner.setAttribute('y', y + 4);
        inner.setAttribute('width', b.w - 8); inner.setAttribute('height', b.h - 8);
        inner.setAttribute('rx', 8); inner.setAttribute('class', 'box inner');
        g.appendChild(inner);
      }
      if (n.role === 'evidence') {
        var fold = document.createElementNS(SVGNS, 'path');
        fold.setAttribute('d', 'M ' + (x + b.w - 16) + ' ' + y + ' L ' + (x + b.w) + ' ' + (y + 16) +
          ' L ' + (x + b.w - 16) + ' ' + (y + 16) + ' Z');
        fold.setAttribute('class', 'fold');
        g.appendChild(fold);
      }

      var badgeRoom = n.status === 'misconception' ? 18 : 0;
      var textTop = y + (b.h - badgeRoom) / 2 - (b.lines.length - 1) * 8;
      b.lines.forEach(function (lineTxt, i) {
        var t = document.createElementNS(SVGNS, 'text');
        t.setAttribute('x', p.x); t.setAttribute('y', textTop + i * 16);
        t.setAttribute('class', 'label');
        t.textContent = lineTxt;
        g.appendChild(t);
      });

      if (n.status === 'misconception') {
        var strike = document.createElementNS(SVGNS, 'line');
        strike.setAttribute('x1', x + 8); strike.setAttribute('y1', y + (b.h - badgeRoom) - 4);
        strike.setAttribute('x2', x + b.w - 8); strike.setAttribute('y2', y + 6);
        strike.setAttribute('class', 'strike');
        g.appendChild(strike);
        var bw = 118, bh2 = 16;
        var br = document.createElementNS(SVGNS, 'rect');
        br.setAttribute('x', p.x - bw / 2); br.setAttribute('y', y + b.h - bh2 - 4);
        br.setAttribute('width', bw); br.setAttribute('height', bh2);
        br.setAttribute('rx', 8); br.setAttribute('class', 'falsebadge');
        g.appendChild(br);
        var bt = document.createElementNS(SVGNS, 'text');
        bt.setAttribute('x', p.x); bt.setAttribute('y', y + b.h - 8);
        bt.setAttribute('class', 'falsebadgetext');
        bt.textContent = '✕ croyance fausse';
        g.appendChild(bt);
      }

      if (opts.badges && firstStep[n.id] !== undefined) {
        var bc = document.createElementNS(SVGNS, 'circle');
        bc.setAttribute('cx', x + 2); bc.setAttribute('cy', y + 2); bc.setAttribute('r', 10);
        bc.setAttribute('class', 'stepbadge');
        g.appendChild(bc);
        var bn = document.createElementNS(SVGNS, 'text');
        bn.setAttribute('x', x + 2); bn.setAttribute('y', y + 6);
        bn.setAttribute('class', 'stepbadgetext');
        bn.textContent = String(firstStep[n.id]);
        g.appendChild(bn);
      }
      svg.appendChild(g);
    });
    return svg;
  }

  function renderNotes(pres) {
    var host = $('notes'); host.innerHTML = '';
    pres.notes.forEach(function (n) {
      var d = document.createElement('div');
      d.className = 'note';
      d.innerHTML = '<span class="origin"></span>';
      d.firstChild.textContent = n.origin;
      d.appendChild(document.createTextNode(' ' + n.text));
      host.appendChild(d);
    });
  }

  function renderInputs(pres) {
    var host = $('inputs'); host.innerHTML = '';
    ir.inputs.forEach(function (inp) {
      var wrap = document.createElement('div');
      wrap.className = 'input' + (pres.lockedInputs.indexOf(inp.id) >= 0 ? ' locked' : '');
      var lab = document.createElement('label');
      lab.textContent = inp.label || inp.id;
      wrap.appendChild(lab);
      var cur = pres.env[inp.id];
      if (inp.control.type === 'choice') {
        inp.control.options.forEach(function (opt) {
          var l2 = document.createElement('label'); l2.className = 'opt';
          var r = document.createElement('input');
          r.type = 'radio'; r.name = 'in-' + inp.id; r.value = opt;
          r.checked = cur === opt;
          r.onchange = function () { commit(inp.id, opt); };
          l2.appendChild(r); l2.appendChild(document.createTextNode(' ' + opt));
          wrap.appendChild(l2);
        });
      } else if (inp.control.type === 'slider') {
        var s = document.createElement('input');
        s.type = 'range'; s.min = inp.control.min; s.max = inp.control.max; s.step = 'any';
        s.value = cur;
        var v = document.createElement('span'); v.className = 'val';
        v.textContent = ' ' + (Math.round(cur * 10) / 10);
        s.oninput = function () { commit(inp.id, parseFloat(s.value)); };
        wrap.appendChild(s); wrap.appendChild(v);
      } else {
        var c = document.createElement('input');
        c.type = 'checkbox'; c.checked = !!cur;
        c.onchange = function () { commit(inp.id, c.checked); };
        wrap.appendChild(c);
      }
      host.appendChild(wrap);
    });
  }

  function commit(id, val) {
    state.inputs[id] = val;
    if (state.committed.indexOf(id) < 0) state.committed.push(id);
    renderAll();
  }

  function renderMeters(pres) {
    var host = $('meters'); host.innerHTML = '';
    ir.marks.forEach(function (m) {
      var v = pres.env[m.value];
      var max = m.max !== undefined ? m.max : 100;
      var pct = Math.max(0, Math.min(100, (parseFloat(v) / max) * 100));
      var d = document.createElement('div'); d.className = 'meter';
      var lab = document.createElement('span'); lab.textContent = m.label + ' : ' + (Math.round(parseFloat(v) * 10) / 10);
      var bar = document.createElement('div'); bar.className = 'bar';
      var fill = document.createElement('div'); fill.className = 'fill'; fill.style.width = pct + '%';
      bar.appendChild(fill);
      d.appendChild(lab); d.appendChild(bar);
      host.appendChild(d);
    });
  }

  function renderStepNav(pres) {
    var host = $('stepnav'); host.innerHTML = '';
    if (pres.maxStep <= 1 && !ir.steps.length) { host.classList.add('empty'); return; }
    host.classList.remove('empty');
    var prev = document.createElement('button');
    prev.textContent = '◀ Préc.'; prev.disabled = !pres.canPrev;
    prev.onclick = function () { state.currentStep = Math.max(1, state.currentStep - 1); renderAll(); };
    var next = document.createElement('button');
    next.textContent = 'Suiv. ▶'; next.disabled = !pres.canNext;
    next.onclick = function () { state.currentStep = Math.min(pres.maxStep, state.currentStep + 1); renderAll(); };
    var lab = document.createElement('span'); lab.className = 'steplabel';
    lab.textContent = 'Étape ' + pres.currentStep + ' / ' + pres.maxStep;
    host.appendChild(prev); host.appendChild(lab); host.appendChild(next);
    if (pres.lockedInputs.length) {
      var lock = document.createElement('span'); lock.className = 'lock';
      var names = pres.lockedInputs.map(function (id) {
        var inp = ir.inputs.filter(function (x) { return x.id === id; })[0];
        return inp && inp.label ? inp.label : id;
      });
      lock.textContent = '🔒 engage-toi d’abord : ' + names.join(', ');
      host.appendChild(lock);
    }
  }

  function renderDiagnostics() {
    var host = $('diags'); host.innerHTML = '';
    var count = $('diagcount');
    var errs = ir.diagnostics.filter(function (d) { return d.severity === 'error'; }).length;
    var warns = ir.diagnostics.length - errs;
    count.textContent = ir.diagnostics.length ? (errs + ' err · ' + warns + ' warn') : '✓';
    count.className = errs ? 'bad' : (warns ? 'meh' : 'good');
    if (!ir.diagnostics.length) {
      var okd = document.createElement('div'); okd.className = 'diag ok';
      okd.textContent = '✓ aucun diagnostic — scène valide';
      host.appendChild(okd); return;
    }
    ir.diagnostics.forEach(function (d) {
      var el = document.createElement('div');
      el.className = 'diag ' + d.severity;
      el.textContent = 'L' + d.line + ' · ' + d.code + ' — ' + d.message + (d.hint ? '  ↳ ' + d.hint : '');
      el.onclick = function () { focusLine(d.line); };
      host.appendChild(el);
    });
  }

  function focusLine(line) {
    var ta = $('src');
    var lines = ta.value.split('\n');
    var start = 0;
    for (var i = 0; i < line - 1 && i < lines.length; i++) start += lines[i].length + 1;
    var end = start + (lines[line - 1] || '').length;
    ta.focus(); ta.setSelectionRange(start, end);
  }

  function renderIRTab() {
    $('irjson').textContent = JSON.stringify(JSON.parse(JSON.stringify(ir)), null, 2);
  }

  /* export: all-revealed + step badges (render-core §5) */
  function exportSVG() {
    var pres = Atomik.present(ir, state, { ignoreGates: true });
    var svg = buildSVG(pres, { badges: true });
    svg.setAttribute('xmlns', SVGNS);
    var style = document.createElement('style');
    style.textContent = document.getElementById('scene-css').textContent;
    svg.insertBefore(style, svg.firstChild.nextSibling);
    var meta = document.createComment(' atomik source:\n' + $('src').value.replace(/--/g, '—') + '\n');
    svg.appendChild(meta);
    var blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (ir.scene ? ir.scene.id : 'scene') + '.svg';
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
  }

  /* ---------- tabs & wiring ---------- */
  function showTab(name) {
    ['source', 'ir', 'diag'].forEach(function (t) {
      $('tab-' + t).classList.toggle('active', t === name);
      $('pane-' + t).style.display = t === name ? '' : 'none';
    });
  }

  function boot() {
    var sel = $('preset');
    Object.keys(PRESETS).forEach(function (k) {
      var o = document.createElement('option');
      o.value = k; o.textContent = PRESETS[k].label;
      sel.appendChild(o);
    });
    sel.onchange = function () { $('src').value = PRESETS[sel.value].src; compile(); };
    $('src').addEventListener('input', onEdit);
    $('tab-source').onclick = function () { showTab('source'); };
    $('tab-ir').onclick = function () { showTab('ir'); };
    $('tab-diag').onclick = function () { showTab('diag'); };
    $('export').onclick = exportSVG;
    document.addEventListener('keydown', function (ev) {
      if (ev.target && ev.target.tagName === 'TEXTAREA') return;
      if (ev.key === 'ArrowRight') { var p1 = Atomik.present(ir, state); if (p1.canNext) { state.currentStep++; renderAll(); } }
      if (ev.key === 'ArrowLeft') { var p2 = Atomik.present(ir, state); if (p2.canPrev) { state.currentStep--; renderAll(); } }
    });
    $('src').value = PRESETS.demo.src;
    showTab('source');
    compile();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

</script>
</body>
</html>
